<!DOCTYPE html>
<html lang="zh-CN" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login.title">登录 - 夜划Ngt</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="./app/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./app/ngt_theme.css">
    <style>
        /* ==================== 基础重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-color: var(--bg-secondary, #f8f7ff);
            color: var(--text-primary, #1e1b4b);
            position: relative;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* 深色模式全局背景 */
        [data-theme="dark"] body {
            background-color: #0b0914;
            color: var(--text-primary, #e2dff0);
        }

        /* ==================== 环境光背景动画 ==================== */
        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            max-width: 600px;
            max-height: 600px;
            background: radial-gradient(circle, rgba(124, 106, 247, 0.4) 0%, rgba(124, 106, 247, 0) 70%);
            animation-delay: -5s;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            max-width: 700px;
            max-height: 700px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.3) 0%, rgba(167, 139, 250, 0) 70%);
        }

        [data-theme="dark"] .blob-1 {
            background: radial-gradient(circle, rgba(124, 106, 247, 0.25) 0%, rgba(124, 106, 247, 0) 70%);
        }
        [data-theme="dark"] .blob-2 {
            background: radial-gradient(circle, rgba(167, 139, 250, 0.2) 0%, rgba(167, 139, 250, 0) 70%);
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.05); }
            100% { transform: translate(-5%, -5%) scale(0.95); }
        }

        /* ==================== 登录容器 ==================== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(124, 106, 247, 0.08), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 100%;
            padding: 48px 40px;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        /* 顶部霓虹渐变条 */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #7c6af7, #a78bfa, #c4b5fd, #7c6af7);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        [data-theme="dark"] .login-container {
            background: rgba(22, 19, 43, 0.7);
            border: 1px solid rgba(124, 106, 247, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px) rotateX(5deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        @keyframes gradientMove {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* ==================== Logo 区 ==================== */
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-img-wrapper {
            width: 84px;
            height: 84px;
            margin: 0 auto 16px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #7c6af7, #a78bfa);
            box-shadow: 0 8px 20px rgba(124, 106, 247, 0.3);
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            from { box-shadow: 0 8px 20px rgba(124, 106, 247, 0.2); }
            to { box-shadow: 0 8px 25px rgba(124, 106, 247, 0.5); }
        }

        .logo img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-primary, white);
            border: 2px solid var(--bg-primary, white);
        }

        [data-theme="dark"] .logo img {
            background-color: #16132b;
            border-color: #16132b;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #1e1b4b, #4c4783);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        [data-theme="dark"] .logo h1 {
            background: linear-gradient(135deg, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            font-size: 14px;
            color: var(--text-secondary, #6b7280);
            font-weight: 400;
        }

        [data-theme="dark"] .logo p {
            color: #9ca3af;
        }

        /* ==================== 表单区 ==================== */
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary, #374151);
        }

        [data-theme="dark"] .form-group label {
            color: #e5e7eb;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: #9ca3af;
            font-size: 16px;
            transition: color 0.3s ease;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--border-color, #e5e7eb);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary, #111827);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        [data-theme="dark"] .form-group input {
            background: rgba(0, 0, 0, 0.2);
            border-color: rgba(255, 255, 255, 0.1);
            color: #f3f4f6;
        }

        .form-group input:hover {
            border-color: #c4b5fd;
        }

        .form-group input:focus {
            background: var(--bg-primary, #ffffff);
            border-color: #7c6af7;
            box-shadow: 0 0 0 4px rgba(124, 106, 247, 0.15);
        }

        [data-theme="dark"] .form-group input:focus {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(124, 106, 247, 0.25);
        }

        /* Focus 时图标高亮 */
        .input-wrapper:focus-within i {
            color: #7c6af7;
        }

        .form-group input::placeholder {
            color: #9ca3af;
            font-weight: 400;
        }

        [data-theme="dark"] .form-group input::placeholder {
            color: #6b7280;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
            display: none;
            align-items: center;
            gap: 6px;
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        .error-message::before {
            content: '\f071';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .error-message.show {
            display: flex;
        }

        .form-group input.error {
            border-color: #ef4444;
        }

        .form-group input.error:focus {
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
        }

        /* ==================== 按钮区 ==================== */
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c6af7 0%, #9333ea 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 106, 247, 0.4);
        }

        .login-button:hover::after {
            left: 150%;
        }

        .login-button:active {
            transform: translateY(1px);
            box-shadow: 0 4px 15px rgba(124, 106, 247, 0.3);
        }

        .login-button:disabled {
            background: #a59ae6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        [data-theme="dark"] .login-button:disabled {
            background: #4c4783;
            color: #9ca3af;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 0.8s linear infinite;
        }

        /* ==================== 底部 ==================== */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(124, 106, 247, 0.1);
        }

        [data-theme="dark"] .footer {
            border-top-color: rgba(255, 255, 255, 0.05);
        }

        .footer p {
            font-size: 13px;
            color: var(--text-tertiary, #9ca3af);
            font-weight: 500;
        }

        /* 语言切换器定位层级 */
        #langSwitcherContainer {
            z-index: 100;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 24px;
                border-radius: 20px;
            }
            .logo h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <!-- 环境光背景 -->
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>

    <div style="position: absolute; top: 20px; right: 20px;" id="langSwitcherContainer"></div>
    
    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo">
                <div class="logo-img-wrapper">
                    <img src="/favicon.ico" alt="Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><rect width=\'100\' height=\'100\' fill=\'%237c6af7\'/><text x=\'50\' y=\'50\' font-family=\'Arial\' font-size=\'40\' font-weight=\'bold\' fill=\'white\' dominant-baseline=\'middle\' text-anchor=\'middle\'>N</text></svg>'">
                </div>
                <h1>夜划Ngt</h1>
                <p data-i18n="login.heading">请登录以继续</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="password" data-i18n="login.password">密码</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            data-i18n="login.passwordPlaceholder"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                            required
                        >
                    </div>
                    <div class="error-message" id="errorMessage" data-i18n="login.error.incorrect">密码错误，请重试</div>
                </div>

                <button type="submit" class="login-button" id="loginButton">
                    <span data-i18n="login.button">登录</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>

            <div class="footer">
                <p>&copy; 2077 夜划Ngt. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script type="module">
        // 1. 设置容错/降级定义
        // 防止在沙盒预览环境、直接双击打开、或相对路径缺失时引发模块解析崩溃。
        let t = (key) => {
            const fallbackTranslations = {
                'login.error.empty': '请输入密码',
                'login.loggingIn': '登录中...',
                'login.error.incorrect': '密码错误，请重试',
                'login.error.failed': '登录失败，请重试',
                'login.button': '登录'
            };
            return fallbackTranslations[key] || key;
        };
        let setLanguage = (lang) => { console.log('Local fallback: Language set to', lang); };
        let initI18n = () => { console.log('Local fallback: I18n initialized.'); };

        // 2. 动态加载模块并包裹异常处理 (完美替换报错的静态 import)
        try {
            const i18nModule = await import('./app/i18n.js');
            initI18n = i18nModule.initI18n;
            t = i18nModule.t;
            setLanguage = i18nModule.setLanguage;
            initI18n();
        } catch (error) {
            console.warn("预览或调试环境提示: 无法加载外部 i18n 模块，已启用内置语言包降级模式。", error.message);
        }
        
        // 3. 初始化语言切换器
        const langContainer = document.getElementById('langSwitcherContainer');
        if (langContainer) {
            try {
                const module = await import('./app/language-switcher.js');
                const switcher = module.createLanguageSwitcher();
                langContainer.appendChild(switcher);
                
                // 绑定事件逻辑
                const languageBtn = switcher.querySelector('#languageBtn');
                const languageDropdown = switcher.querySelector('#languageDropdown');
                const languageOptions = switcher.querySelectorAll('.language-option');
                
                languageBtn?.addEventListener('click', (e) => {
                    e.stopPropagation();
                    languageDropdown.classList.toggle('show');
                });
                
                languageOptions?.forEach(option => {
                    option.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const lang = option.getAttribute('data-lang');
                        setLanguage(lang);
                        const currentLangElement = switcher.querySelector('.current-lang');
                        if (currentLangElement) {
                            currentLangElement.textContent = lang === 'zh-CN' ? '中文' : 'EN';
                        }
                        languageOptions.forEach(opt => opt.classList.remove('active'));
                        option.classList.add('active');
                        languageDropdown.classList.remove('show');
                    });
                });
                
                document.addEventListener('click', () => {
                    if (languageDropdown) languageDropdown.classList.remove('show');
                });
            } catch (error) {
                console.warn("预览或调试环境提示: 无法加载外部 language-switcher 模块。", error.message);
            }
        }

        // 4. 核心登录逻辑
        const loginForm = document.getElementById('loginForm');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loginButton = document.getElementById('loginButton');

        // 检查是否已经登录
        checkLoginStatus();

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            
            if (!password) {
                showError(t('login.error.empty'));
                return;
            }

            // 禁用按钮并显示加载状态
            loginButton.disabled = true;
            loginButton.innerHTML = `<span class="loading"></span><span>${t('login.loggingIn')}</span>`;
            errorMessage.classList.remove('show');

            try {
                // 无论是否在预览环境，都模拟请求或真实请求
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // 登录成功，保存token
                    localStorage.setItem('authToken', data.token);
                    
                    // 跳转到主页
                    window.location.href = '/';
                } else {
                    const errorMsg = data.messageCode ? t(data.messageCode, data.messageParams) : (data.message || t('login.error.incorrect'));
                    showError(errorMsg);
                    resetButton();
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('登录错误:', error);
                // 提供预览环境模拟容错：如果 API 不通（如沙盒环境），则显示标准报错并重置按钮
                showError(t('login.error.failed'));
                resetButton();
            }
        });

        function resetButton() {
            loginButton.disabled = false;
            loginButton.innerHTML = `<span data-i18n="login.button">${t('login.button')}</span><i class="fa-solid fa-arrow-right-to-bracket"></i>`;
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            passwordInput.classList.add('error');
            
            setTimeout(() => {
                passwordInput.classList.remove('error');
            }, 300);
        }

        function checkLoginStatus() {
            const token = localStorage.getItem('authToken');
            
            if (token) {
                // Token存在，跳转到主页
                // window.location.href = '/';
            }
        }

        // 监听输入，清除错误提示
        passwordInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
            passwordInput.classList.remove('error');
        });

        // 页面加载时聚焦到密码输入框
        passwordInput.focus();
    </script>
</body>
</html>
