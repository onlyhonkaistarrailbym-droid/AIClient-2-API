<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 · 管理员</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--p:#6366f1;--pd:#4f46e5;--pl:#818cf8;--s:#10b981;--d:#ef4444;--w:#f59e0b;--bg:#0f0f1a;--card:rgba(20,20,40,.72);--border:rgba(255,255,255,.07);--b2:rgba(255,255,255,.04);--text:#f1f5f9;--t2:#94a3b8;--t3:#64748b}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
        .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.06;pointer-events:none;z-index:0}
        .o1{width:600px;height:600px;background:#6366f1;top:-200px;left:-200px}
        .o2{width:400px;height:400px;background:#8b5cf6;bottom:-100px;right:-100px}
        nav{position:sticky;top:0;z-index:100;background:rgba(15,15,26,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
        .ni{max-width:1120px;margin:0 auto;padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between}
        .brand{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:700;color:var(--text)}
        .bi{width:30px;height:30px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px}
        .abadge{background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.28);color:#818cf8;font-size:11px;padding:2px 8px;border-radius:99px;font-weight:700}
        .nr{display:flex;align-items:center;gap:9px}
        .bn{padding:6px 13px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--t3);font-size:13px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
        .bn:hover{border-color:rgba(99,102,241,.4);color:#818cf8}
        .bd:hover{border-color:rgba(239,68,68,.4);color:#fca5a5}
        main{max-width:1120px;margin:0 auto;padding:26px 22px;position:relative;z-index:1}
        /* Tabs */
        .ptabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:22px;width:fit-content}
        .ptab{padding:8px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--t3);transition:all .2s;white-space:nowrap}
        .ptab.active{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 3px 10px rgba(99,102,241,.3)}
        .ptab:not(.active):hover{color:var(--t2);background:rgba(255,255,255,.05)}
        .pane{display:none}.pane.active{display:block}
        /* Stats */
        .sg{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
        .sc{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
        .sl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:5px;margin-bottom:7px}
        .sv{font-size:26px;font-weight:800;color:var(--text)}
        /* Toolbar */
        .tb{display:flex;gap:9px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
        .sw{position:relative;flex:1;min-width:180px;max-width:260px}
        .sw i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px}
        .si2{width:100%;padding:8px 13px 8px 33px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
        .si2:focus{border-color:rgba(99,102,241,.5)}
        .bp{padding:7px 14px;background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.25);color:#818cf8;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
        .bp:hover{background:rgba(99,102,241,.24)}
        .bo{padding:7px 13px;background:transparent;border:1px solid var(--border);color:var(--t3);border-radius:8px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .2s}
        .bo:hover{border-color:rgba(255,255,255,.15);color:var(--t2)}
        /* Table */
        .tw{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{padding:10px 14px;font-size:10px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
        td{padding:11px 14px;font-size:13px;color:var(--t2);border-bottom:1px solid var(--b2)}
        tr:last-child td{border-bottom:none}
        tr:hover td{background:rgba(255,255,255,.02)}
        td.nm{color:var(--text);font-weight:600}
        .bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700}
        .ba{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.25);color:#a78bfa}
        .bu2{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}
        .bd2{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
        .pm{background:rgba(255,255,255,.06);border-radius:99px;height:4px;width:70px;overflow:hidden;margin-top:4px}
        .pf{height:100%;border-radius:99px}
        .f-ok{background:linear-gradient(90deg,#6366f1,#818cf8)}.f-w{background:#f59e0b}.f-d{background:#ef4444}
        .acts{display:flex;gap:5px;align-items:center}
        .act{padding:4px 9px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;background:transparent;transition:all .2s}
        .ae{color:#818cf8;border-color:rgba(99,102,241,.3)}.ae:hover{background:rgba(99,102,241,.1)}
        .ar{color:var(--t3);border-color:var(--border)}.ar:hover{color:var(--t2);border-color:rgba(255,255,255,.15)}
        .ad{color:#fca5a5;border-color:rgba(239,68,68,.3)}.ad:hover{background:rgba(239,68,68,.1)}
        /* Section card */
        .sec{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
        .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
        .sh-l{display:flex;align-items:center;gap:9px}
        .si{width:32px;height:32px;background:rgba(99,102,241,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#818cf8;font-size:13px;flex-shrink:0}
        .stt{font-size:15px;font-weight:700;color:var(--text)}
        /* Settings */
        .setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--b2)}
        .setting-row:last-child{border-bottom:none;padding-bottom:0}
        .setting-info{flex:1}
        .setting-name{font-size:14px;font-weight:600;color:var(--text)}
        .setting-desc{font-size:12px;color:var(--t3);margin-top:3px}
        .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
        .toggle input{opacity:0;width:0;height:0}
        .slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:99px;cursor:pointer;transition:.3s}
        .slider::before{content:'';position:absolute;left:3px;top:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:.3s}
        input:checked+.slider{background:var(--p)}
        input:checked+.slider::before{transform:translateX(20px)}
        /* Invite codes */
        .ic-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b2)}
        .ic-row:last-child{border-bottom:none;padding-bottom:0}
        .ic-code{font-family:monospace;font-size:15px;font-weight:700;color:#818cf8;letter-spacing:2px;background:rgba(99,102,241,.1);padding:4px 10px;border-radius:6px;cursor:pointer}
        .ic-code:hover{background:rgba(99,102,241,.2)}
        .ic-info{flex:1;font-size:13px;color:var(--t2)}
        .ic-note{font-size:12px;color:var(--t3);margin-top:2px}
        .ic-used{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:700}
        .ic-used.full{background:rgba(239,68,68,.1);color:#fca5a5}
        .ic-used.ok{background:rgba(16,185,129,.1);color:#6ee7b7}
        /* Ann */
        .ann-row{padding:12px 0;border-bottom:1px solid var(--b2)}
        .ann-row:last-child{border-bottom:none;padding-bottom:0}
        .ann-top{display:flex;align-items:flex-start;gap:10px}
        .ann-content{flex:1;font-size:14px;color:var(--t2);line-height:1.6;white-space:pre-wrap;word-break:break-word}
        .ann-actions{display:flex;gap:6px;flex-shrink:0}
        .ann-meta{font-size:11px;color:var(--t3);margin-top:5px;display:flex;align-items:center;gap:8px}
        .pin-badge{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fcd34d;font-size:10px;padding:1px 6px;border-radius:99px;font-weight:700}
        /* New ann form */
        .ann-form{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px}
        .ann-form textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:vertical;min-height:80px;transition:all .2s}
        .ann-form textarea:focus{border-color:rgba(99,102,241,.5)}
        .ann-form textarea::placeholder{color:var(--t3)}
        .ann-form-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px;flex-wrap:wrap}
        .pin-toggle{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--t2);cursor:pointer;user-select:none}
        .pin-toggle input{cursor:pointer;width:14px;height:14px;accent-color:var(--p)}
        /* Alert */
        .alert{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px}
        .alert.show{display:flex}
        .alert.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
        .alert.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
        /* Modal */
        .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
        .ov.show{display:flex}
        .modal{background:#1a1a2e;border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:420px;box-shadow:0 32px 64px rgba(0,0,0,.5);animation:si .2s ease}
        @keyframes si{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
        .modal h2{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;display:flex;align-items:center;gap:7px}
        .modal h2 i{color:#818cf8}
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:10px;font-weight:700;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}
        .fg input,.fg select{width:100%;padding:8px 11px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:all .2s}
        .fg input:focus,.fg select:focus{border-color:rgba(99,102,241,.5)}
        .fg select option{background:#1a1a2e}
        .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
        .empty{text-align:center;padding:40px;color:var(--t3)}
        .empty i{font-size:32px;margin-bottom:10px;opacity:.35;display:block}
        @media(max-width:760px){.sg{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>

<nav>
    <div class="ni">
        <div class="brand"><div class="bi"><i class="fas fa-users-cog"></i></div>用户管理<span class="abadge">管理员</span></div>
        <div class="nr">
            <a href="/index.html" class="bn"><i class="fas fa-home"></i> 控制台</a>
            <button class="bn bd" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
</nav>

<main>
    <div class="alert" id="ga"></div>

    <!-- Page Tabs -->
    <div class="ptabs">
        <div class="ptab active" onclick="showPane('users')"><i class="fas fa-users" style="margin-right:6px"></i>用户管理</div>
        <div class="ptab" onclick="showPane('settings')"><i class="fas fa-sliders" style="margin-right:6px"></i>注册设置</div>
        <div class="ptab" onclick="showPane('invites')"><i class="fas fa-ticket" style="margin-right:6px"></i>邀请码</div>
        <div class="ptab" onclick="showPane('ann')"><i class="fas fa-bullhorn" style="margin-right:6px"></i>公告管理</div>
    </div>

    <!-- ── 用户管理 ── -->
    <div class="pane active" id="pane-users">
        <div class="sg">
            <div class="sc"><div class="sl"><i class="fas fa-users"></i>总用户</div><div class="sv" id="sTotal">—</div></div>
            <div class="sc"><div class="sl"><i class="fas fa-circle-check"></i>活跃</div><div class="sv" id="sActive">—</div></div>
            <div class="sc"><div class="sl"><i class="fas fa-chart-bar"></i>今日请求</div><div class="sv" id="sToday">—</div></div>
            <div class="sc"><div class="sl"><i class="fas fa-database"></i>历史总计</div><div class="sv" id="sAll">—</div></div>
        </div>
        <div class="tb">
            <div class="sw"><i class="fas fa-search"></i><input class="si2" id="search" placeholder="搜索用户名..." oninput="filterUsers()"></div>
            <button class="bp" onclick="showCreate()"><i class="fas fa-plus"></i> 新建用户</button>
            <button class="bo" onclick="loadAll()"><i class="fas fa-rotate"></i> 刷新</button>
        </div>
        <div class="tw"><table><thead><tr><th>用户名</th><th>角色</th><th>今日用量</th><th>总用量</th><th>最近使用</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="utb"></tbody></table></div>
    </div>

    <!-- ── 注册设置 ── -->
    <div class="pane" id="pane-settings">
        <div class="sec">
            <div class="sh"><div class="sh-l"><div class="si"><i class="fas fa-sliders"></i></div><span class="stt">注册与邀请码设置</span></div></div>
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-name">开放注册</div>
                    <div class="setting-desc">关闭后，新用户将无法注册，已有用户不受影响</div>
                </div>
                <label class="toggle"><input type="checkbox" id="swRegOpen" onchange="saveSetting('registerOpen',this.checked)"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <div class="setting-info">
                    <div class="setting-name">需要邀请码</div>
                    <div class="setting-desc">开启后，注册需填写有效邀请码；可在「邀请码」标签页管理</div>
                </div>
                <label class="toggle"><input type="checkbox" id="swInvite" onchange="saveSetting('requireInviteCode',this.checked)"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <!-- ── 邀请码 ── -->
    <div class="pane" id="pane-invites">
        <div class="sec">
            <div class="sh">
                <div class="sh-l"><div class="si"><i class="fas fa-ticket"></i></div><span class="stt">邀请码管理</span></div>
                <button class="bp" onclick="showCreateCode()"><i class="fas fa-plus"></i> 生成邀请码</button>
            </div>
            <div id="codeList"><div class="empty"><i class="fas fa-ticket"></i>暂无邀请码</div></div>
        </div>
    </div>

    <!-- ── 公告 ── -->
    <div class="pane" id="pane-ann">
        <div class="sec">
            <div class="sh">
                <div class="sh-l"><div class="si"><i class="fas fa-bullhorn"></i></div><span class="stt">公告管理</span></div>
            </div>
            <!-- 发布表单 -->
            <div class="ann-form">
                <div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:9px"><i class="fas fa-pen" style="margin-right:5px;color:#818cf8"></i>发布新公告</div>
                <textarea id="annTxt" placeholder="在这里输入公告内容..."></textarea>
                <div class="ann-form-footer">
                    <label class="pin-toggle"><input type="checkbox" id="annPin"> 📌 置顶显示</label>
                    <button class="bp" onclick="postAnn()"><i class="fas fa-paper-plane"></i> 发布</button>
                </div>
            </div>
            <div id="annMgr" style="margin-top:16px"></div>
        </div>
    </div>
</main>

<!-- 编辑用户弹窗 -->
<div class="ov" id="editMod" onclick="closeOv(event,'editMod')">
    <div class="modal">
        <h2><i class="fas fa-pen"></i> 编辑用户</h2>
        <div class="alert" id="editAlert"></div>
        <input type="hidden" id="eu">
        <div class="fg"><label>用户名</label><input id="euD" disabled></div>
        <div class="fg"><label>角色</label><select id="eRole"><option value="user">普通用户</option><option value="admin">管理员</option></select></div>
        <div class="fg"><label>每日额度（0=无限制）</label><input type="number" id="eLim" min="0"></div>
        <div class="fg"><label>状态</label><select id="eEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
        <div class="ma">
            <button class="bo" onclick="document.getElementById('editMod').classList.remove('show')">取消</button>
            <button class="bp" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<!-- 新建用户弹窗 -->
<div class="ov" id="createMod" onclick="closeOv(event,'createMod')">
    <div class="modal">
        <h2><i class="fas fa-user-plus"></i> 新建用户</h2>
        <div class="alert" id="createAlert"></div>
        <div class="fg"><label>用户名</label><input type="text" id="nu"></div>
        <div class="fg"><label>密码</label><input type="password" id="npw"></div>
        <div class="fg"><label>角色</label><select id="nr"><option value="user">普通用户</option><option value="admin">管理员</option></select></div>
        <div class="fg"><label>每日额度（0=无限制）</label><input type="number" id="nl" value="200" min="0"></div>
        <div class="ma">
            <button class="bo" onclick="document.getElementById('createMod').classList.remove('show')">取消</button>
            <button class="bp" onclick="createUser()">创建</button>
        </div>
    </div>
</div>

<!-- 生成邀请码弹窗 -->
<div class="ov" id="codeMod" onclick="closeOv(event,'codeMod')">
    <div class="modal">
        <h2><i class="fas fa-ticket"></i> 生成邀请码</h2>
        <div class="alert" id="codeAlert"></div>
        <div class="fg"><label>备注（可选）</label><input type="text" id="cNote" placeholder="例如：给张三"></div>
        <div class="fg"><label>使用次数限制（0=无限制）</label><input type="number" id="cLim" value="1" min="0"></div>
        <div class="ma">
            <button class="bo" onclick="document.getElementById('codeMod').classList.remove('show')">取消</button>
            <button class="bp" onclick="genCode()">生成</button>
        </div>
    </div>
</div>

<script>
const TK=localStorage.getItem('uak_token');
const ROLE=localStorage.getItem('uak_role');
if(!TK||ROLE!=='admin')window.location.href='/user-login.html';

function H(){return{'Content-Type':'application/json',Authorization:'Bearer '+TK}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function sa(msg,type='err'){
    const el=document.getElementById('ga');
    if(!msg){el.className='alert';return}
    el.innerHTML=`<i class="fas fa-${type==='err'?'circle-exclamation':'circle-check'}"></i> ${esc(msg)}`;
    el.className='alert show '+type;
    if(type==='ok')setTimeout(()=>{el.className='alert'},3000);
}
function ma(id,msg,type='err'){
    const el=document.getElementById(id);
    if(!msg){el.className='alert';return}
    el.innerHTML=`<i class="fas fa-circle-exclamation"></i> ${esc(msg)}`;
    el.className='alert show '+type;
}
function closeOv(e,id){if(e.target.classList.contains('ov'))document.getElementById(id).classList.remove('show')}

// ── Tabs ──
const PANES=['users','settings','invites','ann'];
function showPane(name){
    PANES.forEach(p=>{
        document.getElementById('pane-'+p).className='pane'+(p===name?' active':'');
    });
    document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',PANES[i]===name));
    if(name==='settings')loadSettings();
    if(name==='invites')loadCodes();
    if(name==='ann')loadAnns();
}

// ── Users ──
let allUsers=[];

async function loadAll(){
    try{
        const [ur,sr]=await Promise.all([
            fetch('/api/uak/admin/users',{headers:H()}),
            fetch('/api/uak/admin/stats',{headers:H()})
        ]);
        if(ur.status===401||ur.status===403){localStorage.clear();window.location.href='/user-login.html';return}
        const ud=await ur.json();const sd=await sr.json();
        allUsers=ud.users||[];
        filterUsers();
        if(sd.success){const s=sd.stats;document.getElementById('sTotal').textContent=s.totalUsers;document.getElementById('sActive').textContent=s.activeUsers;document.getElementById('sToday').textContent=s.todayTotalUsage;document.getElementById('sAll').textContent=s.totalUsage}
    }catch(e){sa('加载失败')}
}

function filterUsers(){
    const q=document.getElementById('search').value.toLowerCase();
    render(allUsers.filter(u=>u.username.toLowerCase().includes(q)));
}

function render(users){
    const tb=document.getElementById('utb');
    if(!users.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty"><i class="fas fa-users-slash"></i>暂无用户</div></td></tr>`;return}
    tb.innerHTML=users.map(u=>{
        const pct=u.dailyLimit>0?Math.min(100,(u.todayUsage/u.dailyLimit)*100):0;
        const fc=pct>=90?'f-d':pct>=70?'f-w':'f-ok';
        const lt=u.dailyLimit>0?`${u.todayUsage}/${u.dailyLimit}`:`${u.todayUsage}/∞`;
        const rb=u.role==='admin'?`<span class="bdg ba"><i class="fas fa-crown"></i> 管理员</span>`:`<span class="bdg bu2">用户</span>`;
        const db=!u.enabled?`<span class="bdg bd2" style="margin-left:5px">禁用</span>`:'';
        const lu=u.lastUsedAt?new Date(u.lastUsedAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
        const ca=u.createdAt?new Date(u.createdAt).toLocaleDateString('zh-CN'):'—';
        return `<tr>
            <td class="nm">${esc(u.username)}${db}</td>
            <td>${rb}</td>
            <td><div>${lt}</div>${u.dailyLimit>0?`<div class="pm"><div class="pf ${fc}" style="width:${pct}%"></div></div>`:''}</td>
            <td>${u.totalUsage}</td>
            <td>${lu}</td>
            <td>${ca}</td>
            <td><div class="acts">
                <button class="act ae" onclick="showEdit('${esc(u.username)}')"><i class="fas fa-pen"></i> 编辑</button>
                <button class="act ar" onclick="resetU('${esc(u.username)}')"><i class="fas fa-rotate"></i></button>
                <button class="act ad" onclick="delU('${esc(u.username)}')"><i class="fas fa-trash"></i></button>
            </div></td>
        </tr>`;
    }).join('');
}

function showEdit(un){
    const u=allUsers.find(x=>x.username===un);if(!u)return;
    document.getElementById('eu').value=un;
    document.getElementById('euD').value=un;
    document.getElementById('eRole').value=u.role;
    document.getElementById('eLim').value=u.dailyLimit;
    document.getElementById('eEnabled').value=String(u.enabled);
    ma('editAlert','');
    document.getElementById('editMod').classList.add('show');
}

async function saveEdit(){
    const un=document.getElementById('eu').value;
    const body={role:document.getElementById('eRole').value,dailyLimit:parseInt(document.getElementById('eLim').value)||0,enabled:document.getElementById('eEnabled').value==='true'};
    try{
        const r=await fetch(`/api/uak/admin/users/${encodeURIComponent(un)}`,{method:'PATCH',headers:H(),body:JSON.stringify(body)});
        const d=await r.json();
        if(d.success){document.getElementById('editMod').classList.remove('show');loadAll();sa('保存成功','ok')}
        else ma('editAlert',d.message||'保存失败');
    }catch(e){ma('editAlert','网络错误')}
}

async function resetU(un){
    if(!confirm(`重置 "${un}" 的今日用量？`))return;
    try{const r=await fetch(`/api/uak/admin/users/${encodeURIComponent(un)}/reset-usage`,{method:'POST',headers:H()});const d=await r.json();if(d.success){loadAll();sa('用量已重置','ok')}else sa(d.message||'失败')}catch(e){sa('网络错误')}
}

async function delU(un){
    if(!confirm(`确定删除用户 "${un}"？不可撤销。`))return;
    try{const r=await fetch(`/api/uak/admin/users/${encodeURIComponent(un)}`,{method:'DELETE',headers:H()});const d=await r.json();if(d.success){loadAll();sa('用户已删除','ok')}else sa(d.message||'失败')}catch(e){sa('网络错误')}
}

function showCreate(){
    ['nu','npw'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('nr').value='user';
    document.getElementById('nl').value='200';
    ma('createAlert','');
    document.getElementById('createMod').classList.add('show');
}

async function createUser(){
    const un=document.getElementById('nu').value.trim();
    const pw=document.getElementById('npw').value;
    const role=document.getElementById('nr').value;
    const lim=parseInt(document.getElementById('nl').value)||0;
    if(!un||!pw)return ma('createAlert','请填写用户名和密码');
    try{
        const rr=await fetch('/api/uak/register',{method:'POST',headers:H(),body:JSON.stringify({username:un,password:pw})});
        const rd=await rr.json();
        if(!rd.success)return ma('createAlert',rd.message||'创建失败');
        await fetch(`/api/uak/admin/users/${encodeURIComponent(un)}`,{method:'PATCH',headers:H(),body:JSON.stringify({role,dailyLimit:lim})});
        document.getElementById('createMod').classList.remove('show');
        loadAll();sa(`用户 "${un}" 创建成功`,'ok');
    }catch(e){ma('createAlert','网络错误')}
}

// ── Settings ──
async function loadSettings(){
    try{
        const r=await fetch('/api/uak/admin/settings',{headers:H()});
        const d=await r.json();
        if(d.success){
            document.getElementById('swRegOpen').checked=d.settings.registerOpen;
            document.getElementById('swInvite').checked=d.settings.requireInviteCode;
        }
    }catch(e){}
}

async function saveSetting(key,val){
    try{
        const r=await fetch('/api/uak/admin/settings',{method:'PATCH',headers:H(),body:JSON.stringify({[key]:val})});
        const d=await r.json();
        if(d.success)sa(`设置已更新`,'ok');else sa('保存失败');
    }catch(e){sa('网络错误')}
}

// ── Invite Codes ──
async function loadCodes(){
    try{
        const r=await fetch('/api/uak/admin/invite-codes',{headers:H()});
        const d=await r.json();
        if(!d.success)return;
        const el=document.getElementById('codeList');
        if(!d.codes.length){el.innerHTML='<div class="empty"><i class="fas fa-ticket"></i>暂无邀请码，点击「生成邀请码」创建</div>';return}
        el.innerHTML=d.codes.map(c=>{
            const lim=c.usageLimit>0?c.usageLimit:'∞';
            const used=c.usedCount||0;
            const full=c.usageLimit>0&&used>=c.usageLimit;
            return `<div class="ic-row">
                <span class="ic-code" onclick="copyTxt('${c.code}')" title="点击复制">${c.code}</span>
                <div class="ic-info">
                    ${c.note?`<div style="font-size:13px;color:var(--t2)">${esc(c.note)}</div>`:''}
                    <div class="ic-note">已用 ${used}/${lim} 次 · ${new Date(c.createdAt).toLocaleDateString('zh-CN')}</div>
                </div>
                <span class="ic-used ${full?'full':'ok'}">${full?'已满':'可用'}</span>
                <button class="act ad" onclick="delCode('${c.code}')"><i class="fas fa-trash"></i></button>
            </div>`;
        }).join('');
    }catch(e){}
}

function showCreateCode(){
    document.getElementById('cNote').value='';
    document.getElementById('cLim').value='1';
    ma('codeAlert','');
    document.getElementById('codeMod').classList.add('show');
}

async function genCode(){
    const note=document.getElementById('cNote').value.trim();
    const lim=parseInt(document.getElementById('cLim').value)||0;
    try{
        const r=await fetch('/api/uak/admin/invite-codes',{method:'POST',headers:H(),body:JSON.stringify({note,usageLimit:lim})});
        const d=await r.json();
        if(d.success){
            document.getElementById('codeMod').classList.remove('show');
            loadCodes();
            sa(`邀请码 ${d.code} 已生成`,'ok');
            copyTxt(d.code);
        }else ma('codeAlert',d.message||'生成失败');
    }catch(e){ma('codeAlert','网络错误')}
}

async function delCode(code){
    if(!confirm(`确定删除邀请码 "${code}"？`))return;
    try{const r=await fetch(`/api/uak/admin/invite-codes/${code}`,{method:'DELETE',headers:H()});const d=await r.json();if(d.success){loadCodes();sa('邀请码已删除','ok')}else sa(d.message||'失败')}catch(e){sa('网络错误')}
}

// ── Announcements ──
async function loadAnns(){
    try{
        const r=await fetch('/api/uak/admin/announcements',{headers:H()});
        const d=await r.json();
        if(!d.success)return;
        const el=document.getElementById('annMgr');
        if(!d.announcements.length){el.innerHTML='<div class="empty"><i class="fas fa-bullhorn"></i>暂无公告</div>';return}
        el.innerHTML=d.announcements.map(a=>`
            <div class="ann-row" id="ar_${a.id}">
                <div class="ann-top">
                    <div class="ann-content">${esc(a.content)}</div>
                    <div class="ann-actions">
                        <button class="act ar" onclick="togglePin('${a.id}',${!a.pinned})" title="${a.pinned?'取消置顶':'置顶'}"><i class="fas fa-thumbtack"></i></button>
                        <button class="act ar" onclick="toggleArchive('${a.id}',${!a.archived})" title="${a.archived?'恢复显示':'隐藏'}"><i class="fas fa-${a.archived?'eye':'eye-slash'}"></i></button>
                        <button class="act ad" onclick="delAnn('${a.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
                <div class="ann-meta">
                    ${a.pinned?'<span class="pin-badge">📌 置顶</span>':''}
                    ${a.archived?'<span class="pin-badge" style="background:rgba(100,116,139,.1);border-color:rgba(100,116,139,.2);color:var(--t3)">已隐藏</span>':''}
                    <span>${new Date(a.createdAt).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
                </div>
            </div>`).join('');
    }catch(e){}
}

async function postAnn(){
    const content=document.getElementById('annTxt').value.trim();
    const pinned=document.getElementById('annPin').checked;
    if(!content)return sa('请输入公告内容');
    try{
        const r=await fetch('/api/uak/admin/announcements',{method:'POST',headers:H(),body:JSON.stringify({content,pinned})});
        const d=await r.json();
        if(d.success){document.getElementById('annTxt').value='';document.getElementById('annPin').checked=false;loadAnns();sa('公告已发布','ok')}
        else sa(d.message||'发布失败');
    }catch(e){sa('网络错误')}
}

async function togglePin(id,val){
    try{await fetch(`/api/uak/admin/announcements/${id}`,{method:'PATCH',headers:H(),body:JSON.stringify({pinned:val})});loadAnns()}catch(e){sa('操作失败')}
}
async function toggleArchive(id,val){
    try{await fetch(`/api/uak/admin/announcements/${id}`,{method:'PATCH',headers:H(),body:JSON.stringify({archived:val})});loadAnns()}catch(e){sa('操作失败')}
}
async function delAnn(id){
    if(!confirm('确定删除这条公告？'))return;
    try{const r=await fetch(`/api/uak/admin/announcements/${id}`,{method:'DELETE',headers:H()});const d=await r.json();if(d.success){loadAnns();sa('公告已删除','ok')}else sa('删除失败')}catch(e){sa('网络错误')}
}

function copyTxt(txt){navigator.clipboard.writeText(txt).then(()=>sa('已复制到剪贴板','ok'))}

async function logout(){
    await fetch('/api/uak/logout',{method:'POST',headers:H()}).catch(()=>{});
    localStorage.clear();document.cookie='uak_token=; max-age=0; path=/';
    window.location.href='/user-login.html';
}

loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
