<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 — 管理员</title>
    <link rel="stylesheet" href="app/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: var(--bg-secondary); min-height: 100vh; }
        .navbar { background: var(--bg-primary); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); }
        .navbar-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .brand i { color: var(--primary-color); }
        .admin-badge { background: linear-gradient(135deg, var(--primary-color), var(--primary-light)); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-sm { padding: 6px 14px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.2s; }
        .btn-primary { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        .btn-outline { background: transparent; color: var(--text-secondary); border-color: var(--border-color); }
        .btn-outline:hover { border-color: var(--danger-color); color: var(--danger-color); }
        .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 18px 20px; }
        .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-top: 4px; }
        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .search-input { padding: 8px 14px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-size: 13px; outline: none; width: 220px; }
        .search-input:focus { border-color: var(--primary-color); }
        .table-wrap { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 12px 16px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); background: var(--bg-secondary); text-align: left; }
        td { padding: 12px 16px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid var(--border-color); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-secondary); }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
        .badge-admin { background: rgba(139,92,246,0.15); color: #7c3aed; }
        .badge-user { background: rgba(16,185,129,0.1); color: var(--success-color); }
        .badge-disabled { background: rgba(239,68,68,0.1); color: var(--danger-color); }
        .progress-mini { background: var(--bg-secondary); border-radius: 99px; height: 5px; width: 80px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 99px; background: var(--primary-color); }
        .progress-fill.warning { background: var(--warning-color); }
        .progress-fill.danger { background: var(--danger-color); }
        .action-btn { padding: 4px 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.2s; background: transparent; }
        .action-btn.edit { color: var(--primary-color); border-color: var(--primary-color); }
        .action-btn.delete { color: var(--danger-color); border-color: var(--danger-color); }
        .action-btn:hover { opacity: 0.8; }
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-primary); border: 1px solid var(--border-color); border-radius: var(--radius-xl); padding: 32px; width: 100%; max-width: 440px; box-shadow: var(--shadow-xl); }
        .modal h2 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select { width: 100%; box-sizing: border-box; padding: 9px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-md); background: var(--bg-secondary); color: var(--text-primary); font-size: 13px; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary-color); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
        .alert { padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; margin-bottom: 16px; display: none; }
        .alert.error { background: rgba(239,68,68,0.1); color: var(--danger-color); }
        .alert.success { background: rgba(16,185,129,0.1); color: var(--success-color); }
        @media (max-width: 700px) { .stat-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="brand">
            <i class="fas fa-users-cog"></i> 用户管理
            <span class="admin-badge">管理员</span>
        </div>
        <div class="nav-right">
            <a href="/index.html" style="color:var(--text-secondary);font-size:13px;text-decoration:none;"><i class="fas fa-home"></i> 主控制台</a>
            <button class="btn-sm btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
</nav>

<div class="main">
    <div id="globalAlert" class="alert"></div>

    <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">总用户数</div><div class="stat-value" id="statTotal">-</div></div>
        <div class="stat-card"><div class="stat-label">活跃用户</div><div class="stat-value" id="statActive">-</div></div>
        <div class="stat-card"><div class="stat-label">今日总请求</div><div class="stat-value" id="statToday">-</div></div>
        <div class="stat-card"><div class="stat-label">历史总请求</div><div class="stat-value" id="statAll">-</div></div>
    </div>

    <div class="toolbar">
        <input class="search-input" id="searchInput" placeholder="搜索用户名..." oninput="filterUsers()">
        <button class="btn-sm btn-primary" onclick="showCreateModal()"><i class="fas fa-plus"></i> 新建用户</button>
        <button class="btn-sm btn-outline" onclick="loadData()"><i class="fas fa-sync"></i> 刷新</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>今日用量</th>
                    <th>总用量</th>
                    <th>最近使用</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userTable"></tbody>
        </table>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2 id="modalTitle">编辑用户</h2>
        <div id="modalAlert" class="alert"></div>
        <input type="hidden" id="editUsername">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="editUsernameDisplay" disabled>
        </div>
        <div class="form-group">
            <label>角色</label>
            <select id="editRole">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="form-group">
            <label>每日额度（0=无限制）</label>
            <input type="number" id="editDailyLimit" min="0">
        </div>
        <div class="form-group">
            <label>状态</label>
            <select id="editEnabled">
                <option value="true">启用</option>
                <option value="false">禁用</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn-sm btn-outline" onclick="closeModal()">取消</button>
            <button class="btn-sm btn-primary" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<!-- 新建用户弹窗 -->
<div class="modal-overlay" id="createModal">
    <div class="modal">
        <h2>新建用户</h2>
        <div id="createAlert" class="alert"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="newUsername" placeholder="2~32位">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="newPassword" placeholder="至少6位">
        </div>
        <div class="form-group">
            <label>角色</label>
            <select id="newRole">
                <option value="user">普通用户</option>
                <option value="admin">管理员</option>
            </select>
        </div>
        <div class="form-group">
            <label>每日额度（0=无限制）</label>
            <input type="number" id="newDailyLimit" value="200" min="0">
        </div>
        <div class="modal-actions">
            <button class="btn-sm btn-outline" onclick="document.getElementById('createModal').classList.remove('show')">取消</button>
            <button class="btn-sm btn-primary" onclick="createUser()">创建</button>
        </div>
    </div>
</div>

<script>
const TOKEN = localStorage.getItem('uak_token');
const ROLE = localStorage.getItem('uak_role');
if (!TOKEN || ROLE !== 'admin') window.location.href = '/user-login.html';

let allUsers = [];

function showAlert(msg, type = 'error') {
    const el = document.getElementById('globalAlert');
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = msg ? 'block' : 'none';
}

function modalAlert(id, msg, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert ' + type;
    el.style.display = msg ? 'block' : 'none';
}

function headers() {
    return { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN };
}

async function loadData() {
    try {
        const [usersRes, statsRes] = await Promise.all([
            fetch('/api/uak/admin/users', { headers: headers() }),
            fetch('/api/uak/admin/stats', { headers: headers() })
        ]);
        if (usersRes.status === 403 || usersRes.status === 401) { localStorage.clear(); window.location.href = '/user-login.html'; return; }

        const usersData = await usersRes.json();
        const statsData = await statsRes.json();

        allUsers = usersData.users || [];
        filterUsers();

        if (statsData.success) {
            const s = statsData.stats;
            document.getElementById('statTotal').textContent = s.totalUsers;
            document.getElementById('statActive').textContent = s.activeUsers;
            document.getElementById('statToday').textContent = s.todayTotalUsage;
            document.getElementById('statAll').textContent = s.totalUsage;
        }
    } catch (e) { showAlert('加载失败，请刷新'); }
}

function filterUsers() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allUsers.filter(u => u.username.toLowerCase().includes(q));
    renderTable(filtered);
}

function renderTable(users) {
    const tbody = document.getElementById('userTable');
    if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:32px;">暂无用户</td></tr>';
        return;
    }
    tbody.innerHTML = users.map(u => {
        const pct = u.dailyLimit > 0 ? Math.min(100, (u.todayUsage / u.dailyLimit) * 100) : 0;
        const barClass = pct >= 90 ? 'danger' : pct >= 70 ? 'warning' : '';
        const limitText = u.dailyLimit > 0 ? `${u.todayUsage} / ${u.dailyLimit}` : `${u.todayUsage} / ∞`;
        const roleLabel = u.role === 'admin' ? '<span class="badge badge-admin"><i class="fas fa-crown"></i> 管理员</span>' : '<span class="badge badge-user">用户</span>';
        const statusLabel = u.enabled ? '' : '<span class="badge badge-disabled" style="margin-left:4px;">已禁用</span>';
        const lastUsed = u.lastUsedAt ? new Date(u.lastUsedAt).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '—';
        const createdAt = u.createdAt ? new Date(u.createdAt).toLocaleDateString('zh-CN') : '—';
        return `<tr>
            <td><strong>${u.username}</strong>${statusLabel}</td>
            <td>${roleLabel}</td>
            <td>
                <div>${limitText}</div>
                ${u.dailyLimit > 0 ? `<div class="progress-mini"><div class="progress-fill ${barClass}" style="width:${pct}%"></div></div>` : ''}
            </td>
            <td>${u.totalUsage}</td>
            <td style="color:var(--text-secondary)">${lastUsed}</td>
            <td style="color:var(--text-secondary)">${createdAt}</td>
            <td>
                <button class="action-btn edit" onclick="showEditModal('${u.username}')">编辑</button>
                <button class="action-btn" style="color:var(--text-secondary);border-color:var(--border-color);margin-left:4px;" onclick="resetUsage('${u.username}')">重置</button>
                <button class="action-btn delete" style="margin-left:4px;" onclick="deleteUser('${u.username}')">删除</button>
            </td>
        </tr>`;
    }).join('');
}

function showEditModal(username) {
    const u = allUsers.find(x => x.username === username);
    if (!u) return;
    document.getElementById('editUsername').value = username;
    document.getElementById('editUsernameDisplay').value = username;
    document.getElementById('editRole').value = u.role;
    document.getElementById('editDailyLimit').value = u.dailyLimit;
    document.getElementById('editEnabled').value = String(u.enabled);
    modalAlert('modalAlert', '');
    document.getElementById('editModal').classList.add('show');
}

function closeModal() { document.getElementById('editModal').classList.remove('show'); }

async function saveEdit() {
    const username = document.getElementById('editUsername').value;
    const body = {
        role: document.getElementById('editRole').value,
        dailyLimit: parseInt(document.getElementById('editDailyLimit').value) || 0,
        enabled: document.getElementById('editEnabled').value === 'true',
    };
    try {
        const res = await fetch(`/api/uak/admin/users/${encodeURIComponent(username)}`, {
            method: 'PATCH', headers: headers(), body: JSON.stringify(body)
        });
        const data = await res.json();
        if (data.success) { closeModal(); loadData(); showAlert('保存成功', 'success'); }
        else modalAlert('modalAlert', data.message || '保存失败');
    } catch (e) { modalAlert('modalAlert', '网络错误'); }
}

async function resetUsage(username) {
    if (!confirm(`确定要重置 "${username}" 的今日用量吗？`)) return;
    try {
        const res = await fetch(`/api/uak/admin/users/${encodeURIComponent(username)}/reset-usage`, { method: 'POST', headers: headers() });
        const data = await res.json();
        if (data.success) { loadData(); showAlert('用量已重置', 'success'); }
        else showAlert(data.message || '操作失败');
    } catch (e) { showAlert('网络错误'); }
}

async function deleteUser(username) {
    if (!confirm(`确定要删除用户 "${username}" 吗？此操作不可撤销。`)) return;
    try {
        const res = await fetch(`/api/uak/admin/users/${encodeURIComponent(username)}`, { method: 'DELETE', headers: headers() });
        const data = await res.json();
        if (data.success) { loadData(); showAlert('用户已删除', 'success'); }
        else showAlert(data.message || '删除失败');
    } catch (e) { showAlert('网络错误'); }
}

function showCreateModal() {
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newRole').value = 'user';
    document.getElementById('newDailyLimit').value = '200';
    modalAlert('createAlert', '');
    document.getElementById('createModal').classList.add('show');
}

async function createUser() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const role = document.getElementById('newRole').value;
    const dailyLimit = parseInt(document.getElementById('newDailyLimit').value) || 0;

    if (!username || !password) return modalAlert('createAlert', '请填写用户名和密码');

    try {
        // 先注册
        const regRes = await fetch('/api/uak/register', {
            method: 'POST', headers: headers(),
            body: JSON.stringify({ username, password })
        });
        const regData = await regRes.json();
        if (!regData.success) return modalAlert('createAlert', regData.message || '创建失败');

        // 再更新角色和额度
        await fetch(`/api/uak/admin/users/${encodeURIComponent(username)}`, {
            method: 'PATCH', headers: headers(),
            body: JSON.stringify({ role, dailyLimit })
        });

        document.getElementById('createModal').classList.remove('show');
        loadData();
        showAlert(`用户 "${username}" 创建成功`, 'success');
    } catch (e) { modalAlert('createAlert', '网络错误'); }
}

async function logout() {
    await fetch('/api/uak/logout', { method: 'POST', headers: headers() });
    localStorage.clear();
    document.cookie = 'uak_token=; max-age=0; path=/';
    window.location.href = '/user-login.html';
}

// 关闭弹窗点击遮罩
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('show'); });
});

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
