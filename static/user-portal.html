<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e14;
    --surface: #13151f;
    --surface2: #1a1d2b;
    --surface3: #20243a;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(99,179,237,0.5);
    --text: #e8eaf0;
    --text-muted: #6b7394;
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --success: #68d391;
    --danger: #fc8181;
    --warning: #f6ad55;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(99,179,237,0.06), transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none; z-index: 0;
  }

  /* Layout */
  .app { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title h1 { font-size: 18px; font-weight: 600; }
  .header-title p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-right { display: flex; gap: 10px; }
  .btn-ghost {
    padding: 7px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }

  /* Announcements */
  #annBox {
    display: none;
    margin-bottom: 20px;
    background: rgba(99,179,237,0.05);
    border: 1px solid rgba(99,179,237,0.15);
    border-radius: var(--radius);
    padding: 16px;
  }
  .ann-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .ann-item { font-size: 13px; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .ann-item:last-child { border-bottom: none; }

  /* Stats row */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-value.accent  { color: var(--accent); }
  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Usage bar */
  .usage-bar {
    height: 4px; border-radius: 2px;
    background: var(--surface3); margin-top: 10px; overflow: hidden;
  }
  .usage-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .usage-fill.warn  { background: var(--warning); }
  .usage-fill.danger{ background: var(--danger); }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-body  { padding: 20px; }

  .btn-save {
    padding: 9px 18px; white-space: nowrap;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* Change password */
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="password"] {
    width: 100%; padding: 9px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: var(--border-focus); }

  .btn-primary {
    padding: 9px 20px;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none; z-index: 99;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { color: var(--danger); border-color: rgba(252,129,129,0.3); }
  #toast.success { color: var(--success); border-color: rgba(104,211,145,0.3); }

  /* Role badge */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge.admin { background: rgba(159,122,234,0.15); color: var(--accent2); border: 1px solid rgba(159,122,234,0.3); }
  .badge.user  { background: rgba(99,179,237,0.1);  color: var(--accent);  border: 1px solid rgba(99,179,237,0.2); }

  @media (max-width: 520px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .key-row { flex-direction: column; }
    .btn-save { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="header-icon">🔑</div>
      <div class="header-title">
        <h1>用户中心</h1>
        <p id="usernameBadge">加载中…</p>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-ghost" id="adminBtn" style="display:none" onclick="safeRedirect('user-admin.html')">管理后台</button>
      <button class="btn-ghost" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <!-- Announcements -->
  <div id="annBox">
    <div class="ann-title">📢 公告</div>
    <div id="annList"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">今日使用</div>
      <div class="stat-value accent" id="todayUsage">–</div>
      <div class="usage-bar"><div class="usage-fill" id="usageBar" style="width:0%"></div></div>
      <div class="stat-sub" id="limitLabel">/ – 次额度</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累计使用</div>
      <div class="stat-value success" id="totalUsage">–</div>
      <div class="stat-sub">全部请求总计</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">账号角色</div>
      <div style="margin-top:4px" id="roleBadge"><span class="badge user">用户</span></div>
      <div class="stat-sub" id="lastUsed">最近使用 –</div>
    </div>
  </div>

  <!-- Access Token -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">🔑 你的专属 API Key</span>
    </div>
    <div class="section-body">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px">
        将以下 Key 填入任何支持 OpenAI 格式的客户端（ChatBox、Cherry Studio、酒馆等）的 <strong style="color:var(--text)">API Key 栏</strong>即可使用，无需填写真实 API Key。
      </p>

      <!-- Key display box -->
      <div style="background:var(--surface2);border:1px solid rgba(99,179,237,0.3);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:14px;position:relative">
        <div style="font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">API Key</div>
        <div id="tokenDisplay"
             style="font-family:'DM Mono',monospace;font-size:13px;color:var(--text);
                    word-break:break-all;line-height:1.7;user-select:all;cursor:text">···</div>
      </div>

      <!-- Copy button + instructions -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <button class="btn-save" onclick="copyToken()" id="copyBtn" style="min-width:120px">📋 复制 Key</button>
        <button class="btn-save" style="background:transparent;border:1px solid var(--border);color:var(--warning);" onclick="regenerateKey()">重新生成</button>
      </div>

      <div style="margin-top:16px;padding:12px 14px;background:rgba(246,173,85,0.07);border:1px solid rgba(246,173,85,0.2);border-radius:var(--radius-sm)">
        <p style="font-size:12px;color:var(--warning);line-height:1.6">
          ⚠️ API Base URL 填你的服务器地址 + <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:11px;color:var(--text)">/v1</code>。<br>
          ⚠️ 请勿将此 Key 分享给他人——它代表你的身份和额度。如果重置，旧的 Key 会立刻失效。
        </p>
      </div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">修改密码</span>
    </div>
    <div class="section-body">
      <div class="field">
        <label>原密码</label>
        <input type="password" id="oldPass" placeholder="输入原密码">
      </div>
      <div class="field">
        <label>新密码</label>
        <input type="password" id="newPass" placeholder="至少 6 位">
      </div>
      <button class="btn-primary" onclick="changePassword()">更新密码</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';
const token = localStorage.getItem('uak_token');

// 安全跳转机制，防止在受限的沙盒预览环境中引发 SyntaxError 报错
function safeRedirect(url) {
  try {
    window.location.href = url;
  } catch (e) {
    document.body.innerHTML = `<div style="padding:60px 20px;text-align:center;"><h2 style="margin-bottom:16px;color:var(--text);">沙盒环境拦截</h2><p style="color:var(--text-muted);">代码预览工具的安全限制已阻止向 <strong>${url}</strong> 的跳转。</p><p style="font-size:13px;color:var(--text-muted);margin-top:8px;">(在您的真实服务器上将正常执行)</p></div>`;
  }
}

function clearTokenAndRedirect() {
  localStorage.removeItem('uak_token');
  localStorage.removeItem('uak_role');
  document.cookie = 'uak_token=; max-age=0; path=/';
  safeRedirect('user-login.html');
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  try {
    const r = await fetch(BASE + '/api/uak/me', {
      headers: { 'Authorization': 'Bearer ' + token, 'x-uak-token': token }
    });

    const text = await r.text();
    let d = {};
    try { d = JSON.parse(text); } catch(e) {}

    // 精准识别真实被踢出的原因
    if (r.status === 401) {
      if (d.success === false && (d.message === '未登录' || d.message === '无效的 API Key 或登录已过期')) {
        clearTokenAndRedirect(); 
        return;
      }
      toast('接口响应异常，请刷新重试', 'error');
      return;
    }

    if (!r.ok || !d.success) throw new Error(d.message || '加载失败');

    // 渲染用户数据
    const u = d.user;
    // 【友好提示旧账号重新生成】
    document.getElementById('tokenDisplay').textContent = u.proxyKey || '（旧账号暂无 Key，请点击右侧【重新生成】获取）';
    if (!u.proxyKey) {
        document.getElementById('tokenDisplay').style.color = 'var(--warning)';
    }
    
    const today = u.todayUsage || 0;
    const limit = u.dailyLimit || 0;
    const pct = limit > 0 ? Math.min(100, Math.round(today/limit*100)) : 0;

    document.getElementById('usernameBadge').textContent = u.username + (u.role==='admin' ? ' · 管理员' : '');
    document.getElementById('todayUsage').textContent = today;
    document.getElementById('totalUsage').textContent = u.totalUsage || 0;
    document.getElementById('limitLabel').textContent = '/ ' + (limit > 0 ? limit : '无限') + ' 次额度';
    document.getElementById('roleBadge').innerHTML = `<span class="badge ${u.role}">${u.role==='admin'?'管理员':'用户'}</span>`;
    document.getElementById('lastUsed').textContent = u.lastUsedAt ? '最近 ' + new Date(u.lastUsedAt).toLocaleDateString() : '尚未使用';

    const bar = document.getElementById('usageBar');
    bar.style.width = pct + '%';
    bar.className = 'usage-fill' + (pct>=90?' danger': pct>=70?' warn':'');

    if (u.role === 'admin') document.getElementById('adminBtn').style.display = '';

  } catch(e) { 
    toast('网络连接失败', 'error'); 
  }

  // 加载公告
  try {
    const r2 = await fetch(BASE + '/api/uak/announcements', { 
      headers: { 'Authorization': 'Bearer ' + token, 'x-uak-token': token } 
    });
    const text2 = await r2.text();
    let d2 = {};
    try { d2 = JSON.parse(text2); } catch(e) {}
    
    if (d2.success && d2.announcements && d2.announcements.length) {
      document.getElementById('annBox').style.display = '';
      document.getElementById('annList').innerHTML = d2.announcements.map(a =>
        `<div class="ann-item">${a.pinned ? '📌 ' : ''}<span>${escHtml(a.content)}</span></div>`
      ).join('');
    }
  } catch(e) {}
}

async function regenerateKey() {
  if (!confirm('重置后旧的 Key 将立即失效！确定要重置吗？')) return;
  try {
    // 【核心修复】这里补充了双重头部校验，防止由于大锅饭插件拦截导致的401重置失败
    const r = await fetch(BASE + '/api/uak/regenerate-key', { 
        method: 'POST', 
        headers: { 'Authorization': 'Bearer ' + token, 'x-uak-token': token } 
    });
    const d = await r.json();
    if (d.success) { 
        toast('✓ API Key 已重置'); 
        const td = document.getElementById('tokenDisplay');
        td.textContent = d.proxyKey; 
        td.style.color = 'var(--text)';
    }
    else toast('操作失败', 'error');
  } catch(e) { toast('网络错误', 'error'); }
}

async function copyToken() {
  const tokenVal = document.getElementById('tokenDisplay').textContent;
  if(tokenVal.includes('重新生成')) return toast('请先点击右侧重新生成', 'error');
  
  try {
    await navigator.clipboard.writeText(tokenVal);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ 已复制';
    setTimeout(() => { btn.textContent = '📋 复制 Key'; }, 2000);
    toast('✓ API Key 已复制');
    const td = document.getElementById('tokenDisplay');
    if (td) { td.style.color = 'var(--success)'; setTimeout(() => td.style.color = 'var(--text)', 1200); }
  } catch(e) {
    toast('请手动选中复制', 'error');
  }
}

async function changePassword() {
  const oldPass = document.getElementById('oldPass').value;
  const newPass = document.getElementById('newPass').value;
  if (!oldPass || !newPass) return toast('请填写两个密码框', 'error');
  try {
    const r = await fetch(BASE + '/api/uak/change-password', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + token, 'x-uak-token': token },
      body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
    });
    const d = await r.json();
    if (d.success) { toast('✓ 密码已更新'); document.getElementById('oldPass').value = ''; document.getElementById('newPass').value = ''; }
    else toast(d.message || '修改失败', 'error');
  } catch(e) { toast('网络错误', 'error'); }
}

async function doLogout() {
  await fetch(BASE + '/api/uak/logout', { 
    method:'POST', 
    headers:{'Authorization': 'Bearer ' + token, 'x-uak-token': token} 
  }).catch(()=>{});
  clearTokenAndRedirect();
}

// 确保只在 token 存在时执行加载
if (!token) {
  safeRedirect('user-login.html');
} else {
  load();
}
</script>
</body>
</html>
