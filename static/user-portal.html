<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户中心</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e14;
    --surface: #13151f;
    --surface2: #1a1d2b;
    --surface3: #20243a;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(99,179,237,0.5);
    --text: #e8eaf0;
    --text-muted: #6b7394;
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --success: #68d391;
    --danger: #fc8181;
    --warning: #f6ad55;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(99,179,237,0.06), transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none; z-index: 0;
  }

  /* Layout */
  .app { max-width: 800px; margin: 0 auto; padding: 24px 20px 60px; position: relative; z-index: 1; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title h1 { font-size: 18px; font-weight: 600; }
  .header-title p  { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-right { display: flex; gap: 10px; }
  .btn-ghost {
    padding: 7px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-muted); font-family: inherit; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }

  /* Announcements */
  #annBox {
    display: none;
    margin-bottom: 20px;
    background: rgba(99,179,237,0.05);
    border: 1px solid rgba(99,179,237,0.15);
    border-radius: var(--radius);
    padding: 16px;
  }
  .ann-title { font-size: 12px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .ann-item { font-size: 13px; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .ann-item:last-child { border-bottom: none; }

  /* Stats row */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
  }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .stat-value.accent  { color: var(--accent); }
  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--warning); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

  /* Usage bar */
  .usage-bar {
    height: 4px; border-radius: 2px;
    background: var(--surface3); margin-top: 10px; overflow: hidden;
  }
  .usage-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .usage-fill.warn  { background: var(--warning); }
  .usage-fill.danger{ background: var(--danger); }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 14px; font-weight: 600; }
  .section-body  { padding: 20px; }

  /* API Key form */
  .key-row {
    display: flex; gap: 10px; align-items: flex-end;
    margin-bottom: 12px;
  }
  .key-row:last-child { margin-bottom: 0; }
  .key-group { flex: 1; }
  .key-label {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .key-input-wrap { position: relative; }
  .key-input {
    width: 100%; padding: 9px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .key-input:focus { border-color: var(--border-focus); }
  .key-status {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--surface3);
  }
  .key-status.set { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .btn-save {
    padding: 9px 18px; white-space: nowrap;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* Change password */
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input[type="password"] {
    width: 100%; padding: 9px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: var(--border-focus); }

  .btn-primary {
    padding: 9px 20px;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.88; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 10px 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none; z-index: 99;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { color: var(--danger); border-color: rgba(252,129,129,0.3); }
  #toast.success { color: var(--success); border-color: rgba(104,211,145,0.3); }

  /* Role badge */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge.admin { background: rgba(159,122,234,0.15); color: var(--accent2); border: 1px solid rgba(159,122,234,0.3); }
  .badge.user  { background: rgba(99,179,237,0.1);  color: var(--accent);  border: 1px solid rgba(99,179,237,0.2); }

  @media (max-width: 520px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .key-row { flex-direction: column; }
    .btn-save { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="header-icon">🔑</div>
      <div class="header-title">
        <h1>用户中心</h1>
        <p id="usernameBadge">加载中…</p>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-ghost" id="adminBtn" style="display:none" onclick="location.href='user-admin.html'">管理后台</button>
      <button class="btn-ghost" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <!-- Announcements -->
  <div id="annBox">
    <div class="ann-title">📢 公告</div>
    <div id="annList"></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">今日使用</div>
      <div class="stat-value accent" id="todayUsage">–</div>
      <div class="usage-bar"><div class="usage-fill" id="usageBar" style="width:0%"></div></div>
      <div class="stat-sub" id="limitLabel">/ – 次额度</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累计使用</div>
      <div class="stat-value success" id="totalUsage">–</div>
      <div class="stat-sub">全部请求总计</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">账号角色</div>
      <div style="margin-top:4px" id="roleBadge"><span class="badge user">用户</span></div>
      <div class="stat-sub" id="lastUsed">最近使用 –</div>
    </div>
  </div>

  <!-- API Keys -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">API Key 配置</span>
    </div>
    <div class="section-body">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:18px">
        填入您自己的真实 API Key，请求时将自动使用您的 Key 转发。Key 仅存储在服务端，界面上只显示脱敏版本。
      </p>
      <div id="keyForms"></div>
    </div>
  </div>

  <!-- Change Password -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">修改密码</span>
    </div>
    <div class="section-body">
      <div class="field">
        <label>原密码</label>
        <input type="password" id="oldPass" placeholder="输入原密码">
      </div>
      <div class="field">
        <label>新密码</label>
        <input type="password" id="newPass" placeholder="至少 6 位">
      </div>
      <button class="btn-primary" onclick="changePassword()">更新密码</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';
const token = localStorage.getItem('uak_token');
if (!token) { location.href = 'user-login.html'; }

function clearTokenAndRedirect() {
  localStorage.removeItem('uak_token');
  localStorage.removeItem('uak_role');
  document.cookie = 'uak_token=; max-age=0; path=/';
  location.href = 'user-login.html';
}

let userData = null;

const PROVIDERS = ['anthropic', 'openai', 'gemini', 'deepseek', 'groq'];
const PROVIDER_NAMES = { anthropic:'Anthropic', openai:'OpenAI', gemini:'Google Gemini', deepseek:'DeepSeek', groq:'Groq' };

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

async function load() {
  try {
    const r = await fetch(BASE + '/api/uak/me', { headers: { 'x-uak-token': token } });
    if (r.status === 401) { clearTokenAndRedirect(); return; }
    const d = await r.json();
    if (!d.success) throw new Error();
    userData = d.user;
    render();
  } catch(e) { toast('加载失败', 'error'); }

  // Announcements
  try {
    const r2 = await fetch(BASE + '/api/uak/announcements', { headers: { 'x-uak-token': token } });
    const d2 = await r2.json();
    if (d2.success && d2.announcements.length) {
      document.getElementById('annBox').style.display = '';
      document.getElementById('annList').innerHTML = d2.announcements.map(a =>
        `<div class="ann-item">${a.pinned ? '📌 ' : ''}<span>${escHtml(a.content)}</span></div>`
      ).join('');
    }
  } catch(e) {}
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const u = userData;
  const today = u.todayUsage || 0;
  const limit = u.dailyLimit || 0;
  const pct = limit > 0 ? Math.min(100, Math.round(today/limit*100)) : 0;

  document.getElementById('usernameBadge').textContent = u.username + (u.role==='admin' ? ' · 管理员' : '');
  document.getElementById('todayUsage').textContent = today;
  document.getElementById('totalUsage').textContent = u.totalUsage || 0;
  document.getElementById('limitLabel').textContent = '/ ' + (limit > 0 ? limit : '无限') + ' 次额度';
  document.getElementById('roleBadge').innerHTML = `<span class="badge ${u.role}">${u.role==='admin'?'管理员':'用户'}</span>`;
  document.getElementById('lastUsed').textContent = u.lastUsedAt ? '最近 ' + new Date(u.lastUsedAt).toLocaleDateString() : '尚未使用';

  const bar = document.getElementById('usageBar');
  bar.style.width = pct + '%';
  bar.className = 'usage-fill' + (pct>=90?' danger': pct>=70?' warn':'');

  if (u.role === 'admin') document.getElementById('adminBtn').style.display = '';

  // Build key forms
  const masked = u.apiKeysMasked || {};
  const container = document.getElementById('keyForms');
  container.innerHTML = PROVIDERS.map(p => {
    const hasKey = !!masked[p];
    return `
    <div class="key-row">
      <div class="key-group">
        <div class="key-label">${PROVIDER_NAMES[p] || p}</div>
        <div class="key-input-wrap">
          <input class="key-input" id="key_${p}" type="text"
            placeholder="${hasKey ? masked[p] : '粘贴您的 API Key'}"
            autocomplete="off" spellcheck="false">
          <div class="key-status ${hasKey?'set':''}" title="${hasKey?'已配置':'未配置'}"></div>
        </div>
      </div>
      <button class="btn-save" onclick="saveKey('${p}')">保存</button>
    </div>`;
  }).join('');
}

async function saveKey(provider) {
  const val = document.getElementById('key_' + provider).value.trim();
  try {
    const r = await fetch(BASE + '/api/uak/my-apikey', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'x-uak-token': token },
      body: JSON.stringify({ provider, apiKey: val })
    });
    const d = await r.json();
    if (d.success) { toast('✓ ' + (PROVIDER_NAMES[provider]||provider) + ' Key 已保存'); load(); }
    else toast('保存失败', 'error');
  } catch(e) { toast('网络错误', 'error'); }
}

async function changePassword() {
  const oldPass = document.getElementById('oldPass').value;
  const newPass = document.getElementById('newPass').value;
  if (!oldPass || !newPass) return toast('请填写两个密码框', 'error');
  try {
    const r = await fetch(BASE + '/api/uak/change-password', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-uak-token': token },
      body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
    });
    const d = await r.json();
    if (d.success) { toast('✓ 密码已更新'); document.getElementById('oldPass').value = ''; document.getElementById('newPass').value = ''; }
    else toast(d.message || '修改失败', 'error');
  } catch(e) { toast('网络错误', 'error'); }
}

async function doLogout() {
  await fetch(BASE + '/api/uak/logout', { method:'POST', headers:{'x-uak-token':token} }).catch(()=>{});
  document.cookie = 'uak_token=; max-age=0; path=/';
  localStorage.removeItem('uak_token');
  localStorage.removeItem('uak_role');
  location.href = 'user-login.html';
}

load();
</script>
</body>
</html>
