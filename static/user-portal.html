<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心 · 夜划</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #0f0f1a; --bg2: #1a1a2e; --card: rgba(20,20,40,0.7);
            --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.04);
            --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none; z-index: 0; }
        .bg-orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; left: -200px; }
        .bg-orb-2 { width: 400px; height: 400px; background: #06b6d4; bottom: -150px; right: -150px; }

        /* Navbar */
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(15,15,26,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .navbar-inner { max-width: 960px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--text); }
        .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .user-chip { display: flex; align-items: center; gap: 7px; padding: 5px 12px; background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.2); border-radius: 20px; font-size: 13px; color: #818cf8; }
        .btn-logout { padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .2s; }
        .btn-logout:hover { border-color: var(--danger); color: #fca5a5; }

        /* Main */
        .main { max-width: 960px; margin: 0 auto; padding: 28px 24px; position: relative; z-index: 1; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
        .stat-value { font-size: 30px; font-weight: 800; color: var(--text); line-height: 1; }
        .stat-sub { font-size: 12px; color: var(--text3); margin-top: 6px; }
        .progress-bar { background: rgba(255,255,255,.06); border-radius: 99px; height: 5px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 99px; transition: width .4s; }
        .fill-ok { background: linear-gradient(90deg,#6366f1,#818cf8); }
        .fill-warn { background: linear-gradient(90deg,#f59e0b,#fbbf24); }
        .fill-danger { background: linear-gradient(90deg,#ef4444,#f87171); }

        /* Section */
        .section { background: var(--card); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
        .section-icon { width: 34px; height: 34px; background: rgba(99,102,241,.15); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #818cf8; font-size: 14px; }
        .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
        .section-desc { font-size: 13px; color: var(--text3); margin: -10px 0 18px; line-height: 1.6; }

        /* Provider rows */
        .provider-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border2); }
        .provider-row:last-child { border-bottom: none; padding-bottom: 0; }
        .provider-name { font-size: 13px; font-weight: 600; color: var(--text2); width: 150px; flex-shrink: 0; display: flex; align-items: center; gap: 7px; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
        .status-dot.active { background: var(--success); box-shadow: 0 0 6px rgba(16,185,129,.5); }
        .key-input { flex: 1; padding: 9px 13px; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace; outline: none; transition: all .2s; min-width: 0; }
        .key-input:focus { border-color: rgba(99,102,241,.5); background: rgba(99,102,241,.05); }
        .key-input::placeholder { color: var(--text3); }
        .btn-save { padding: 8px 16px; background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.25); color: #818cf8; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all .2s; }
        .btn-save:hover { background: rgba(99,102,241,.25); }

        /* Alert */
        .alert { padding: 11px 14px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: none; align-items: center; gap: 8px; }
        .alert.show { display: flex; }
        .alert.error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.25); color: #fca5a5; }
        .alert.success { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.25); color: #6ee7b7; }

        /* Endpoint box */
        .endpoint-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-top: 10px; }
        .endpoint-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; white-space: nowrap; }
        .endpoint-text { flex: 1; font-family: monospace; font-size: 12px; color: var(--text2); word-break: break-all; }
        .btn-copy { padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .2s; }
        .btn-copy:hover { border-color: rgba(99,102,241,.4); color: #818cf8; }

        /* Password form */
        .pw-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 10px; align-items: end; }
        .pw-grid input { padding: 9px 13px; background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 13px; outline: none; transition: all .2s; }
        .pw-grid input:focus { border-color: rgba(99,102,241,.5); }
        .pw-grid input::placeholder { color: var(--text3); }
        .pw-grid .btn-save { align-self: stretch; }

        @media (max-width: 680px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .provider-row { flex-wrap: wrap; }
            .provider-name { width: 100%; }
            .pw-grid { grid-template-columns: 1fr 1fr; }
            .pw-grid .btn-save { grid-column: span 2; }
        }
    </style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-shield-halved"></i></div>
            用户中心
        </div>
        <div class="nav-right">
            <div class="user-chip"><i class="fas fa-user-circle"></i><span id="usernameDisplay">加载中</span></div>
            <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
</nav>

<div class="main">
    <div class="alert" id="globalAlert"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">今日用量</div>
            <div class="stat-value" id="todayUsage">—</div>
            <div class="stat-sub">已用 / 共 <span id="dailyLimit">—</span> 次</div>
            <div class="progress-bar"><div class="progress-fill fill-ok" id="usageBar" style="width:0%"></div></div>
        </div>
        <div class="stat-card">
            <div class="stat-label">累计用量</div>
            <div class="stat-value" id="totalUsage">—</div>
            <div class="stat-sub">历史请求总计</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">最近使用</div>
            <div class="stat-value" style="font-size:16px;margin-top:8px;line-height:1.4" id="lastUsed">—</div>
        </div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-icon"><i class="fas fa-key"></i></div>
            <span class="section-title">我的 API Keys</span>
        </div>
        <p class="section-desc">填写你自己的真实 API Key，发送请求时服务器将自动使用对应的 Key 转发。</p>
        <div id="providerList"></div>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-icon"><i class="fas fa-plug"></i></div>
            <span class="section-title">接入配置</span>
        </div>
        <p class="section-desc">在客户端填写以下信息，通过本服务中转请求（需在请求头中携带你的 Token）。</p>
        <div class="endpoint-box">
            <span class="endpoint-label">Base URL</span>
            <span class="endpoint-text" id="baseUrl"></span>
            <button class="btn-copy" onclick="copy('baseUrl')"><i class="fas fa-copy"></i> 复制</button>
        </div>
        <div class="endpoint-box" style="margin-top:8px">
            <span class="endpoint-label">UAK Token</span>
            <span class="endpoint-text" id="myToken" style="font-family:monospace;font-size:11px"></span>
            <button class="btn-copy" onclick="copy('myToken')"><i class="fas fa-copy"></i> 复制</button>
        </div>
        <p style="font-size:12px;color:var(--text3);margin-top:10px;line-height:1.6">在请求头中加入 <code style="background:rgba(255,255,255,.07);padding:2px 6px;border-radius:4px;font-size:11px">x-uak-token: &lt;Token&gt;</code> 即可完成认证</p>
    </div>

    <div class="section">
        <div class="section-header">
            <div class="section-icon"><i class="fas fa-lock"></i></div>
            <span class="section-title">修改密码</span>
        </div>
        <div class="pw-grid">
            <input type="password" id="oldPwd" placeholder="当前密码">
            <input type="password" id="newPwd" placeholder="新密码（≥6位）">
            <input type="password" id="confirmPwd" placeholder="确认新密码">
            <button class="btn-save" onclick="changePassword()">更新密码</button>
        </div>
    </div>
</div>

<script>
const TOKEN = localStorage.getItem('uak_token');
if (!TOKEN) window.location.href = '/user-login.html';

const PROVIDERS = [
    { id: 'claude-custom', name: 'Claude 自定义', icon: 'fa-c' },
    { id: 'openai-custom', name: 'OpenAI 自定义', icon: 'fa-robot' },
    { id: 'gemini-cli', name: 'Gemini CLI OAuth', icon: 'fa-google' },
    { id: 'claude-kiro', name: 'Claude Kiro OAuth', icon: 'fa-shield' },
    { id: 'grok', name: 'Grok Reverse', icon: 'fa-bolt' },
];

function showAlert(msg, type = 'error') {
    const el = document.getElementById('globalAlert');
    if (!msg) { el.className = 'alert'; return; }
    el.innerHTML = `<i class="fas fa-${type==='error'?'circle-exclamation':'circle-check'}"></i> ${msg}`;
    el.className = 'alert show ' + type;
    setTimeout(() => { el.className = 'alert'; }, 4000);
}

async function loadMe() {
    try {
        const res = await fetch('/api/uak/me', { headers: { Authorization: 'Bearer ' + TOKEN } });
        if (res.status === 401) { localStorage.clear(); window.location.href = '/user-login.html'; return; }
        const data = await res.json();
        if (!data.success) return;
        const u = data.user;
        document.getElementById('usernameDisplay').textContent = u.username;
        document.getElementById('todayUsage').textContent = u.todayUsage;
        document.getElementById('dailyLimit').textContent = u.dailyLimit > 0 ? u.dailyLimit : '∞';
        document.getElementById('totalUsage').textContent = u.totalUsage;
        document.getElementById('lastUsed').textContent = u.lastUsedAt ? new Date(u.lastUsedAt).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '暂无';
        const pct = u.dailyLimit > 0 ? Math.min(100, (u.todayUsage / u.dailyLimit) * 100) : 0;
        const bar = document.getElementById('usageBar');
        bar.style.width = pct + '%';
        bar.className = 'progress-fill ' + (pct >= 90 ? 'fill-danger' : pct >= 70 ? 'fill-warn' : 'fill-ok');
        renderProviders(data.user.apiKeysMasked || {});
        document.getElementById('baseUrl').textContent = window.location.origin;
        document.getElementById('myToken').textContent = TOKEN;
    } catch(e) { showAlert('加载失败，请刷新'); }
}

function renderProviders(masked) {
    document.getElementById('providerList').innerHTML = PROVIDERS.map(p => {
        const has = !!masked[p.id];
        return `<div class="provider-row">
            <div class="provider-name"><div class="status-dot ${has?'active':''}"></div>${p.name}</div>
            <input class="key-input" id="key_${p.id}" type="password" placeholder="${has?'已配置（输入新值以替换）':'粘贴你的 API Key'}" autocomplete="off">
            <button class="btn-save" onclick="saveKey('${p.id}')"><i class="fas fa-save"></i> 保存</button>
        </div>`;
    }).join('');
}

async function saveKey(provider) {
    const input = document.getElementById('key_' + provider);
    const apiKey = input.value.trim();
    if (!apiKey) return showAlert('请输入 API Key');
    try {
        const res = await fetch('/api/uak/my-apikey', { method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN }, body: JSON.stringify({ provider, apiKey }) });
        const data = await res.json();
        if (data.success) { input.value = ''; input.placeholder = '已配置（输入新值以替换）'; document.querySelector(`#key_${provider}`).closest('.provider-row').querySelector('.status-dot').className = 'status-dot active'; showAlert('API Key 已保存', 'success'); }
        else showAlert(data.message || '保存失败');
    } catch(e) { showAlert('网络错误'); }
}

async function changePassword() {
    const old = document.getElementById('oldPwd').value;
    const nw = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;
    if (!old || !nw) return showAlert('请填写原密码和新密码');
    if (nw !== confirm) return showAlert('两次密码不一致');
    try {
        const res = await fetch('/api/uak/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN }, body: JSON.stringify({ oldPassword: old, newPassword: nw }) });
        const data = await res.json();
        if (data.success) { showAlert('密码已更新，请重新登录', 'success'); setTimeout(logout, 1500); }
        else showAlert(data.message || '修改失败');
    } catch(e) { showAlert('网络错误'); }
}

function copy(id) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => showAlert('已复制到剪贴板', 'success'));
}

async function logout() {
    await fetch('/api/uak/logout', { method: 'POST', headers: { Authorization: 'Bearer ' + TOKEN } }).catch(()=>{});
    localStorage.clear();
    document.cookie = 'uak_token=; max-age=0; path=/';
    window.location.href = '/user-login.html';
}

loadMe();
</script>
</body>
</html>
