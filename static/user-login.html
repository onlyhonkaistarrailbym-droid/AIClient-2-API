<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户中心 · 登录</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0e14;
    --surface: #13151f;
    --surface2: #1a1d2b;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(99,179,237,0.5);
    --text: #e8eaf0;
    --text-muted: #6b7394;
    --accent: #63b3ed;
    --accent2: #9f7aea;
    --success: #68d391;
    --danger: #fc8181;
    --warning: #f6ad55;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background glow orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, var(--accent), transparent 70%);
    top: -150px; left: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, var(--accent2), transparent 70%);
    bottom: -100px; right: -100px;
  }

  .wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 20px;
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin-bottom: 14px;
    box-shadow: 0 0 30px rgba(99,179,237,0.25);
  }
  .logo h1 {
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .logo p {
    font-size: 13px; color: var(--text-muted);
    margin-top: 4px;
  }

  /* Announcements */
  #announcements {
    margin-bottom: 16px;
    display: none;
  }
  .ann-item {
    background: rgba(99,179,237,0.07);
    border: 1px solid rgba(99,179,237,0.18);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .ann-pin { flex-shrink: 0; opacity: 0.7; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    background: none; border: none; cursor: pointer;
    border-radius: 6px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }

  /* Alert */
  .alert {
    display: none;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-bottom: 16px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .alert.error   { background: rgba(252,129,129,0.1); border: 1px solid rgba(252,129,129,0.25); color: var(--danger); }
  .alert.success { background: rgba(104,211,145,0.1); border: 1px solid rgba(104,211,145,0.25); color: var(--success); }
  .alert.show { display: block; }

  /* Form */
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  input {
    width: 100%; padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit; font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(99,179,237,0.1);
  }
  input::placeholder { color: var(--text-muted); opacity: 0.5; }

  /* Invite code field - visibility controlled by JS after fetching register-status */
  #inviteField { display: none; } /* hidden until JS decides */

  /* Submit button */
  .btn {
    width: 100%; padding: 11px;
    background: linear-gradient(135deg, var(--accent), #4299e1);
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
    position: relative; overflow: hidden;
  }
  .btn:hover { opacity: 0.92; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.loading::after {
    content: '';
    position: absolute; inset: 0;
    background: inherit;
    display: flex; align-items: center; justify-content: center;
  }

  .register-closed-msg {
    display: none;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding: 16px 0 4px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🔑</div>
    <h1>API 用户中心</h1>
    <p>使用自己的 API Key 访问服务</p>
  </div>

  <div id="announcements"></div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">登录</button>
      <button class="tab-btn" id="registerTabBtn" onclick="switchTab('register')">注册</button>
    </div>

    <div class="alert" id="alert"></div>

    <!-- 登录表单 -->
    <div id="loginForm">
      <div class="field">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn" onclick="doLogin()" id="loginBtn">登 录</button>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm" style="display:none">
      <div class="field">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="2~32位，字母数字下划线或中文" autocomplete="username">
      </div>
      <div class="field">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="至少 6 位" autocomplete="new-password">
      </div>
      <div class="field" id="inviteField">
        <label>邀请码</label>
        <input type="text" id="inviteCode" placeholder="输入邀请码" style="font-family:'DM Mono',monospace;letter-spacing:2px;text-transform:uppercase">
      </div>
      <div class="register-closed-msg" id="registerClosedMsg">⚠️ 注册暂已关闭，请联系管理员</div>
      <button class="btn" onclick="doRegister()" id="registerBtn"
              onkeydown="if(event.key==='Enter') doRegister()">注 册</button>
    </div>
  </div>
</div>

<script>
const BASE = '';
let registerOpen = true;
let requireInviteCode = false;

async function init() {
  // 获取注册状态
  try {
    const r = await fetch(BASE + '/api/uak/register-status');
    const d = await r.json();
    if (d.success) {
      registerOpen = d.registerOpen;
      requireInviteCode = d.requireInviteCode;
      document.getElementById('inviteField').style.display = requireInviteCode ? '' : 'none';
      if (!registerOpen) {
        document.getElementById('registerTabBtn').disabled = true;
        document.getElementById('registerTabBtn').style.opacity = '0.4';
        document.getElementById('registerTabBtn').title = '注册已关闭';
      }
    }
  } catch(e) {}

  // 加载公告
  try {
    const r = await fetch(BASE + '/api/uak/announcements');
    const d = await r.json();
    if (d.success && d.announcements.length) {
      const box = document.getElementById('announcements');
      box.style.display = '';
      box.innerHTML = d.announcements.map(a =>
        `<div class="ann-item">${a.pinned ? '<span class="ann-pin">📌</span>' : ''}<span>${escHtml(a.content)}</span></div>`
      ).join('');
    }
  } catch(e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.textContent = msg; el.className = 'alert ' + type + ' show';
}
function clearAlert() {
  document.getElementById('alert').className = 'alert';
}

function switchTab(tab) {
  clearAlert();
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  if (tab === 'register') {
    document.getElementById('inviteField').style.display = requireInviteCode ? '' : 'none';
    if (!registerOpen) {
      document.getElementById('registerClosedMsg').style.display = '';
      document.getElementById('registerBtn').disabled = true;
    } else {
      document.getElementById('registerClosedMsg').style.display = 'none';
      document.getElementById('registerBtn').disabled = false;
    }
  }
}

async function doLogin() {
  clearAlert();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) return showAlert('请填写用户名和密码');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const r = await fetch(BASE + '/api/uak/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (d.success) {
      document.cookie = `uak_token=${d.token}; path=/; max-age=${7*86400}`;
      localStorage.setItem('uak_token', d.token);
      localStorage.setItem('uak_role', d.role);
      showAlert('登录成功，跳转中…', 'success');
      setTimeout(() => {
        location.href = d.role === 'admin' ? 'user-admin.html' : 'user-portal.html';
      }, 600);
    } else {
      showAlert(d.message || '登录失败');
      btn.disabled = false; btn.textContent = '登 录';
    }
  } catch(e) {
    showAlert('网络错误，请重试');
    btn.disabled = false; btn.textContent = '登 录';
  }
}

async function doRegister() {
  clearAlert();
  if (!registerOpen) return showAlert('注册已关闭');
  const username   = document.getElementById('regUsername').value.trim();
  const password   = document.getElementById('regPassword').value;
  const inviteCode = document.getElementById('inviteCode').value.trim();
  if (!username || !password) return showAlert('请填写用户名和密码');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = '注册中…';
  try {
    const r = await fetch(BASE + '/api/uak/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password, inviteCode: inviteCode || undefined })
    });
    const d = await r.json();
    if (d.success) {
      showAlert(d.message || '注册成功，请登录', 'success');
      setTimeout(() => switchTab('login'), 1200);
    } else {
      showAlert(d.message || '注册失败');
    }
  } catch(e) {
    showAlert('网络错误，请重试');
  }
  btn.disabled = false; btn.textContent = '注 册';
}

init();
</script>
</body>
</html>
