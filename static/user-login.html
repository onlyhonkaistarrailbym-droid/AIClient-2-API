<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--p:#6366f1;--pd:#4f46e5;--pl:#818cf8;--s:#10b981;--d:#ef4444;--bg:#0f0f1a;--border:rgba(255,255,255,.08);--text:#f1f5f9;--t2:#94a3b8;--t3:#64748b}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
        .o1{width:500px;height:500px;background:#6366f1;top:-150px;left:-150px}
        .o2{width:350px;height:350px;background:#06b6d4;bottom:-100px;right:-100px}
        .o3{width:250px;height:250px;background:#8b5cf6;top:45%;right:8%}
        .card{position:relative;z-index:1;background:rgba(20,20,40,.88);backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 32px 64px rgba(0,0,0,.4);animation:up .4s cubic-bezier(.16,1,.3,1)}
        @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .logo{text-align:center;margin-bottom:32px}
        .logo-icon{width:68px;height:68px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;color:#fff;box-shadow:0 8px 28px rgba(99,102,241,.4)}
        .logo h1{font-size:21px;font-weight:700;color:var(--text)}
        .logo p{color:var(--t3);font-size:13px;margin-top:5px}
        .tabs{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
        .tab{flex:1;padding:9px;text-align:center;font-size:14px;font-weight:600;border-radius:9px;cursor:pointer;color:var(--t3);transition:all .2s;user-select:none}
        .tab.active{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35)}
        .tab:not(.active):hover{color:var(--t2);background:rgba(255,255,255,.05)}
        .alert{padding:10px 13px;border-radius:10px;font-size:13px;margin-bottom:18px;display:none;align-items:center;gap:8px}
        .alert.show{display:flex}
        .alert.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
        .alert.ok{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
        .alert.info{background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.25);color:#a5b4fc}
        .fg{margin-bottom:16px}
        .fg label{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:7px;text-transform:uppercase;letter-spacing:.7px}
        .iw{position:relative}
        .ii{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
        .fg input{width:100%;padding:10px 14px 10px 37px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:all .2s;-webkit-appearance:none}
        .fg input:focus{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.06);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
        .fg input::placeholder{color:var(--t3)}
        .invite-row{display:none}
        .btn{width:100%;padding:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,.35);transition:all .2s}
        .btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.45)}
        .btn:disabled{opacity:.6;cursor:not-allowed}
        /* 公告横幅 */
        .ann-banner{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:10px;padding:10px 13px;margin-bottom:18px;display:none}
        .ann-banner.show{display:block}
        .ann-item{font-size:13px;color:#a5b4fc;line-height:1.6;padding:4px 0;border-bottom:1px solid rgba(99,102,241,.15)}
        .ann-item:last-child{border-bottom:none}
        .ann-item .pin{color:#f59e0b;margin-right:5px;font-size:11px}
        /* 注册关闭提示 */
        .closed-tip{text-align:center;padding:16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;color:#fca5a5;font-size:13px;margin-bottom:18px;display:none}
        .closed-tip.show{display:block}
        .footer{text-align:center;margin-top:20px;font-size:12px;color:var(--t3)}
    </style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="card">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
        <h1>用户中心</h1>
        <p>使用自己的 API Key 访问服务</p>
    </div>

    <!-- 公告 -->
    <div class="ann-banner" id="annBanner"></div>

    <div class="tabs">
        <div class="tab active" id="t-login" onclick="sw('login')"><i class="fas fa-sign-in-alt" style="margin-right:4px"></i>登录</div>
        <div class="tab" id="t-reg" onclick="sw('register')"><i class="fas fa-user-plus" style="margin-right:4px"></i>注册</div>
    </div>

    <div class="closed-tip" id="closedTip"><i class="fas fa-lock" style="margin-right:6px"></i>注册暂已关闭，请联系管理员获取邀请</div>

    <div class="alert" id="alert"></div>

    <div class="fg">
        <label>用户名</label>
        <div class="iw"><i class="ii fas fa-at"></i><input type="text" id="un" placeholder="输入用户名" autocomplete="username"></div>
    </div>
    <div class="fg">
        <label>密码</label>
        <div class="iw"><i class="ii fas fa-key"></i><input type="password" id="pw" placeholder="输入密码" autocomplete="current-password"></div>
    </div>
    <div class="fg invite-row" id="invRow">
        <label>邀请码 <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--t3)">(如需)</span></label>
        <div class="iw"><i class="ii fas fa-hashtag"></i><input type="text" id="ic" placeholder="粘贴邀请码" autocomplete="off"></div>
    </div>

    <button class="btn" id="submitBtn" onclick="go()"><span id="btnTxt">登录</span></button>
    <div class="footer">遇到问题？联系管理员获取帮助</div>
</div>

<script>
let mode='login', regOpen=true, needInvite=false;

async function init(){
    try{
        const [sr, ar] = await Promise.all([
            fetch('/api/uak/register-status'),
            fetch('/api/uak/announcements')
        ]);
        const sd=await sr.json(); const ad=await ar.json();
        regOpen=sd.registerOpen; needInvite=sd.requireInviteCode;

        // 公告
        const anns=(ad.announcements||[]).filter(a=>!a.archived);
        if(anns.length){
            const banner=document.getElementById('annBanner');
            banner.innerHTML=anns.map(a=>`<div class="ann-item">${a.pinned?'<span class="pin">📌</span>':''}${esc(a.content)}</div>`).join('');
            banner.classList.add('show');
        }
    }catch(e){}
    updateUI();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function updateUI(){
    const isReg=mode==='register';
    document.getElementById('closedTip').className='closed-tip'+(isReg&&!regOpen?' show':'');
    document.getElementById('invRow').style.display=isReg&&needInvite?'block':'none';
    document.getElementById('submitBtn').disabled=isReg&&!regOpen;
}

function sw(tab){
    mode=tab;
    document.getElementById('t-login').classList.toggle('active',tab==='login');
    document.getElementById('t-reg').classList.toggle('active',tab==='register');
    document.getElementById('btnTxt').textContent=tab==='login'?'登录':'注册';
    showAlert('');
    updateUI();
}

function showAlert(msg,type='err'){
    const el=document.getElementById('alert');
    if(!msg){el.className='alert';return}
    el.innerHTML=`<i class="fas fa-${type==='err'?'circle-exclamation':type==='ok'?'circle-check':'circle-info'}"></i> ${esc(msg)}`;
    el.className='alert show '+type;
}

async function go(){
    const un=document.getElementById('un').value.trim();
    const pw=document.getElementById('pw').value;
    const ic=document.getElementById('ic').value.trim();
    if(!un)return showAlert('请输入用户名');
    if(!pw)return showAlert('请输入密码');
    const btn=document.getElementById('submitBtn');
    btn.disabled=true; btn.textContent='处理中...';
    try{
        const ep=mode==='login'?'/api/uak/login':'/api/uak/register';
        const body=mode==='login'?{username:un,password:pw}:{username:un,password:pw,inviteCode:ic};
        const res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await res.json();
        if(!d.success)return showAlert(d.message||'操作失败');
        if(mode==='register'){
            showAlert(d.message||'注册成功！请登录','ok');
            setTimeout(()=>sw('login'),1000);
            return;
        }
        localStorage.setItem('uak_token',d.token);
        localStorage.setItem('uak_role',d.role);
        document.cookie=`uak_token=${d.token}; path=/; max-age=${7*24*3600}; SameSite=Lax`;
        showAlert('登录成功，正在跳转...','ok');
        setTimeout(()=>{window.location.href=d.role==='admin'?'/user-admin.html':'/user-portal.html'},600);
    }catch(e){showAlert('网络错误，请重试')}
    finally{btn.disabled=false;document.getElementById('btnTxt').textContent=mode==='login'?'登录':'注册'}
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')go()});
const tk=localStorage.getItem('uak_token');
if(tk){window.location.href=localStorage.getItem('uak_role')==='admin'?'/user-admin.html':'/user-portal.html'}
document.getElementById('un').focus();
init();
</script>
</body>
</html>
